<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Фреди · виртуальный психолог</title>
    
    <!-- 🔥 MAX BRIDGE - ОБЯЗАТЕЛЬНО ДЛЯ РАБОТЫ В МЕССЕНДЖЕРЕ MAX 🔥 -->
    <script src="https://st.max.ru/js/max-web-app.js"></script>
    
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        /* Базовые стили на время загрузки (до применения темы) */
        body {
            background-color: #0e1621;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        
        /* Стили для загрузки */
        .loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }
        
        .loading-spinner {
            font-size: 48px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            margin-top: 20px;
            font-size: 16px;
            color: var(--max-text-secondary);
        }
        
        /* Стили для экрана входа */
        .login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100%;
            text-align: center;
            padding: 40px 20px;
        }
        
        .login-icon {
            font-size: 64px;
            margin-bottom: 24px;
        }
        
        .login-title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 16px;
            background: linear-gradient(135deg, var(--max-blue), #6c5ce7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .login-text {
            font-size: 16px;
            color: var(--max-text-secondary);
            line-height: 1.6;
            margin-bottom: 32px;
            max-width: 400px;
        }
        
        .login-btn {
            background: var(--max-blue);
            border: none;
            border-radius: 40px;
            padding: 14px 32px;
            font-size: 18px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .login-btn:hover {
            transform: scale(1.02);
            background: var(--max-blue-hover);
        }
        
        /* Стили для голосовых функций */
        .voice-input-area {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--glass-border, rgba(255,255,255,0.1));
        }
        
        .voice-record-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--max-blue, #248bf2);
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        
        .voice-record-btn:hover {
            transform: scale(1.05);
        }
        
        .voice-record-btn.recording {
            background: #ff4444;
            animation: pulse-red 1s infinite;
        }
        
        @keyframes pulse-red {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,68,68,0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 0 8px rgba(255,68,68,0); }
        }
        
        .recording-timer {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            z-index: 1000;
            backdrop-filter: blur(10px);
            pointer-events: none;
        }
        
        .voice-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--max-text-secondary);
            margin-top: 8px;
            justify-content: center;
        }
        
        .voice-status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff4444;
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        /* Аудиоплеер (скрытый) */
        #hiddenAudioPlayer {
            display: none;
        }
        
        /* Toast уведомления */
        .toast-message {
            position: fixed;
            bottom: 120px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 12px 20px;
            border-radius: 30px;
            text-align: center;
            z-index: 1100;
            transition: opacity 0.3s;
            opacity: 0;
            pointer-events: none;
        }
        
        .toast-message.show {
            opacity: 1;
        }
        
        .toast-message.success {
            background: #28a745;
        }
        
        .toast-message.error {
            background: #dc3545;
        }
        
        .toast-message.info {
            background: var(--max-blue, #248bf2);
        }
        
        /* Адаптация для мобильных */
        @media (max-width: 480px) {
            .voice-record-btn {
                width: 48px;
                height: 48px;
                font-size: 24px;
            }
            
            .recording-timer {
                bottom: 80px;
                padding: 6px 16px;
                font-size: 16px;
            }
            
            .toast-message {
                bottom: 100px;
                padding: 10px 16px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="app" id="app">
        <!-- ===== ЛЕВАЯ ПАНЕЛЬ (список чатов) ===== -->
        <div class="chats-panel" id="chatsPanel">
            <div class="chats-header">
                <div class="chats-title">Мессенджер</div>
                <button class="new-chat-btn" id="newChatBtn">✎</button>
            </div>
            <div class="chats-search">
                <input type="text" placeholder="Поиск" id="chatSearchInput">
            </div>
            <div class="chats-list" id="chatsList">
                <div class="chat-item active" data-chat="fredi" id="chatFredi">
                    <div class="chat-avatar">
                        <img src="https://ui-avatars.com/api/?name=Ф&background=248bf2&color=fff&size=128" alt="Ф">
                    </div>
                    <div class="chat-info">
                        <div class="chat-name">Фреди · психолог</div>
                        <div class="chat-preview" id="chatPreview">🧠 Чем могу помочь?</div>
                    </div>
                    <div class="chat-time" id="chatTime">сейчас</div>
                </div>
            </div>
            <div class="chats-footer" id="chatsFooter">
                <div class="user-mini-profile" id="userMiniProfile">
                    <div class="user-mini-avatar">
                        <img src="https://ui-avatars.com/api/?name=Я&background=248bf2&color=fff&size=64" alt="Я" id="userAvatar">
                    </div>
                    <div class="user-mini-info">
                        <div class="user-mini-name" id="userName">Загрузка...</div>
                        <div class="user-mini-status" id="userStatus">🧠 загрузка</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ===== ПРАВАЯ ПАНЕЛЬ (основной контент) ===== -->
        <div class="chat-panel" id="chatPanel">
            <!-- Шапка чата -->
            <div class="chat-header" id="chatHeader">
                <div class="chat-header-left">
                    <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
                    <div class="chat-header-avatar">
                        <img src="https://ui-avatars.com/api/?name=Ф&background=248bf2&color=fff&size=128" alt="Ф">
                    </div>
                    <div class="chat-header-info">
                        <div class="chat-header-name">Фреди</div>
                        <div class="chat-header-status" id="botStatus">🧠 психолог</div>
                    </div>
                </div>
                <div class="chat-header-right">
                    <button class="header-btn" id="menuBtn">⋮</button>
                </div>
            </div>

            <!-- Контейнер для динамической загрузки экранов -->
            <div id="screenContainer" class="screen-container">
                <!-- Экран загрузки -->
                <div class="loading-screen">
                    <div class="loading-spinner">🧠</div>
                    <div class="loading-text">Загрузка личного кабинета...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== СКРЫТЫЙ АУДИОПЛЕЕР ДЛЯ ВОСПРОИЗВЕДЕНИЯ ОТВЕТОВ ===== -->
    <audio id="hiddenAudioPlayer" preload="auto"></audio>

    <!-- ===== ТАЙМЕР ЗАПИСИ ===== -->
    <div id="recordingTimer" class="recording-timer" style="display: none;">0s</div>
    
    <!-- ===== TOAST УВЕДОМЛЕНИЯ ===== -->
    <div id="toastMessage" class="toast-message"></div>

    <!-- ===== ШАБЛОНЫ ЭКРАНОВ (для обратной совместимости) ===== -->

    <!-- Экран 1: Приветствие (для тех, кто не прошел тест) -->
    <template id="onboardingScreen1">
        <div class="onboarding-container">
            <div class="onboarding-content">
                <div class="onboarding-avatar">🧠</div>
                <div class="onboarding-title">Фреди</div>
                <div class="onboarding-subtitle">виртуальный психолог</div>
                
                <div class="onboarding-text" id="onboardingText1">
                    Привет, <span id="userNamePlaceholder">друг</span>!<br><br>
                    
                    Я — Фреди, виртуальный психолог.<br>
                    Оцифрованная версия Андрея Мейстера — его цифровой слепок.<br><br>
                    
                    🎭 Короче, я — это он, только батарейка дольше держит и пожрать не прошу.<br><br>
                    
                    🕒 Нам нужно познакомиться, потому что я пока не экстрасенс.<br><br>
                    
                    🧐 Чтобы я понимал, с кем имею дело — давай пройдём тест.<br><br>
                    
                    📊 Всего 5 этапов:<br><br>
                    1️⃣ Конфигурация восприятия<br>
                    2️⃣ Конфигурация мышления<br>
                    3️⃣ Конфигурация поведения<br>
                    4️⃣ Точка роста<br>
                    5️⃣ Глубинные паттерны<br><br>
                    
                    ⏱ 15 минут — и я буду знать о тебе больше, чем ты думаешь.
                </div>
                
                <div class="onboarding-buttons">
                    <button class="onboarding-btn primary" id="startTestBtn">🚀 Давай, погнали!</button>
                    <button class="onboarding-btn secondary" id="whoAreYouBtn">🤨 А ты кто вообще такой?</button>
                </div>
            </div>
        </div>
    </template>

    <!-- Экран 2: "А ты кто вообще" -->
    <template id="onboardingScreen2">
        <div class="onboarding-container">
            <div class="onboarding-content">
                <div class="onboarding-text">
                    🎭 Ну, вопрос хороший. Давайте по существу.<br><br>
                    
                    Видите ли, дорогой человек, я — экспериментальная модель.<br>
                    Андрей Мейстер однажды подумал: "А что, если я создам свою цифровую копию? Пусть работает, пока я сплю, ем или просто ленюсь".<br><br>
                    
                    Так я и появился. 🧠<br><br>
                    
                    🧐 Что я умею:<br><br>
                    • Вижу паттерны там, где вы видите просто день сурка<br>
                    • Нахожу систему в ваших "случайных" решениях<br>
                    • Понимаю, почему вы выбираете одних и тех же "не тех" людей<br>
                    • Я реально беспристрастен — у меня нет плохого настроения<br><br>
                    
                    🎯 Конкретно по тесту:<br><br>
                    1️⃣ Восприятие — поймём, какую линзу вы носите<br>
                    2️⃣ Мышление — узнаем, как вы пережёвываете реальность<br>
                    3️⃣ Поведение — посмотрим, что вы делаете "на автомате"<br>
                    4️⃣ Точка роста — я скажу, куда вам двигаться<br>
                    5️⃣ Глубинные паттерны — заглянем в детство и подсознание<br><br>
                    
                    ⏱ 15 минут — и я составлю ваш профиль.
                </div>
                
                <div class="onboarding-buttons">
                    <button class="onboarding-btn primary" id="letsGoBtn">👌 Погнали!</button>
                </div>
            </div>
        </div>
    </template>

    <!-- Экран 3: Сбор контекста (город) -->
    <template id="contextCityScreen">
        <div class="context-container">
            <div class="context-content">
                <div class="context-title">📝 Давайте познакомимся</div>
                
                <div class="context-question">Из какого вы города?</div>
                <div class="context-hint">(Напишите название)</div>
                
                <div class="context-input-group">
                    <input type="text" class="context-input" id="cityInput" placeholder="Например: Москва">
                    <button class="context-submit" id="submitCityBtn">➡️</button>
                </div>
                
                <button class="context-skip" id="skipContextBtn">⏭ Позже</button>
            </div>
        </div>
    </template>

    <!-- Экран 4: Выбор пола -->
    <template id="contextGenderScreen">
        <div class="context-container">
            <div class="context-content">
                <div class="context-title">📝 Давайте познакомимся</div>
                
                <div class="context-question">Укажите ваш пол:</div>
                
                <div class="gender-buttons">
                    <button class="gender-btn" id="genderMaleBtn">
                        <span class="gender-emoji">👨</span>
                        <span class="gender-text">Мужской</span>
                    </button>
                    <button class="gender-btn" id="genderFemaleBtn">
                        <span class="gender-emoji">👩</span>
                        <span class="gender-text">Женский</span>
                    </button>
                </div>
                
                <button class="context-skip" id="skipGenderBtn">⏭ Позже</button>
            </div>
        </div>
    </template>

    <!-- Экран 5: Ввод возраста -->
    <template id="contextAgeScreen">
        <div class="context-container">
            <div class="context-content">
                <div class="context-title">📝 Давайте познакомимся</div>
                
                <div class="context-question">Сколько вам лет?</div>
                <div class="context-hint">(Напишите число)</div>
                
                <div class="context-input-group">
                    <input type="number" class="context-input" id="ageInput" placeholder="Например: 35" min="1" max="120">
                    <button class="context-submit" id="submitAgeBtn">➡️</button>
                </div>
                
                <button class="context-skip" id="skipAgeBtn">⏭ Позже</button>
            </div>
        </div>
    </template>

    <!-- Экран 6: Контекст собран (предложение теста) -->
    <template id="contextCompleteScreen">
        <div class="context-complete-container">
            <div class="context-complete-content">
                <div class="context-complete-title">✅ Отлично! Теперь я знаю о вас:</div>
                
                <div class="context-info" id="contextInfo">
                    📍 Город: <span id="infoCity">Москва</span><br>
                    👤 Пол: <span id="infoGender">Мужчина</span><br>
                    📅 Возраст: <span id="infoAge">35</span> лет<br>
                    <span id="infoWeather">🌧 Погода: пасмурно, +5°C</span>
                </div>
                
                <div class="context-next-text">
                    🎯 Теперь я буду учитывать это в наших разговорах!<br><br>
                    
                    🧠 <b>ЧТО ДАЛЬШЕ?</b><br><br>
                    
                    Чтобы я мог помочь по-настоящему, нужно пройти тест (15 минут).<br>
                    Он определит ваш психологический профиль по 4 векторам и глубинным паттернам.
                </div>
                
                <div class="context-complete-buttons">
                    <button class="onboarding-btn primary" id="startRealTestBtn">🚀 НАЧАТЬ ТЕСТ</button>
                    <button class="onboarding-btn secondary" id="whatTestGivesBtn">📖 ЧТО ДАЕТ ТЕСТ</button>
                    <button class="onboarding-btn secondary" id="askQuestionPreBtn">❓ ЗАДАТЬ ВОПРОС</button>
                </div>
            </div>
        </div>
    </template>

    <!-- Экран 7: Что дает тест -->
    <template id="benefitsScreen">
        <div class="benefits-container">
            <div class="benefits-content">
                <div class="benefits-title">🔍 ЧТО ВЫ УЗНАЕТЕ О СЕБЕ:</div>
                
                <div class="benefits-list">
                    <div class="benefit-item">
                        <div class="benefit-stage">🧠 ЭТАП 1: КОНФИГУРАЦИЯ ВОСПРИЯТИЯ</div>
                        <div class="benefit-desc">Линза, через которую вы смотрите на мир.</div>
                    </div>
                    
                    <div class="benefit-item">
                        <div class="benefit-stage">🧠 ЭТАП 2: КОНФИГУРАЦИЯ МЫШЛЕНИЯ</div>
                        <div class="benefit-desc">Как вы обрабатываете информацию.</div>
                    </div>
                    
                    <div class="benefit-item">
                        <div class="benefit-stage">🧠 ЭТАП 3: КОНФИГУРАЦИЯ ПОВЕДЕНИЯ</div>
                        <div class="benefit-desc">Ваши автоматические реакции.</div>
                    </div>
                    
                    <div class="benefit-item">
                        <div class="benefit-stage">🧠 ЭТАП 4: ТОЧКА РОСТА</div>
                        <div class="benefit-desc">Где находится рычаг изменений.</div>
                    </div>
                    
                    <div class="benefit-item">
                        <div class="benefit-stage">🧠 ЭТАП 5: ГЛУБИННЫЕ ПАТТЕРНЫ</div>
                        <div class="benefit-desc">Тип привязанности, защитные механизмы, базовые убеждения.</div>
                    </div>
                </div>
                
                <div class="benefits-after">
                    ⚡ <b>ПОСЛЕ ТЕСТА ВЫ ПОЛУЧИТЕ:</b><br><br>
                    
                    ✅ Полный психологический портрет<br>
                    ✅ Глубинный анализ подсознательных паттернов<br>
                    ✅ Выбор стиля общения: 🔮 КОУЧ | 🧠 ПСИХОЛОГ | ⚡ ТРЕНЕР<br>
                    ✅ Индивидуальный навигатор по целям<br>
                    ✅ Напоминания и поддержка на пути<br><br>
                    
                    ⏱ <b>Всего 15 минут</b>
                </div>
                
                <div class="benefits-buttons">
                    <button class="onboarding-btn primary" id="startTestFromBenefitsBtn">🚀 НАЧАТЬ ТЕСТ</button>
                    <button class="onboarding-btn secondary" id="backToContextBtn">◀️ НАЗАД</button>
                </div>
            </div>
        </div>
    </template>

    <!-- ========== ШАБЛОНЫ ПОСЛЕ ТЕСТА ========== -->

    <!-- Экран 8: Финальный профиль (результаты теста) -->
    <template id="finalProfileScreen">
        <div class="final-profile-container">
            <div class="final-profile-content">
                <div class="profile-header">
                    <div class="profile-emoji">🧠</div>
                    <h2 class="profile-title">ВАШ ПСИХОЛОГИЧЕСКИЙ ПОРТРЕТ</h2>
                </div>
                
                <div class="profile-text" id="profileText">
                    <!-- Здесь будет сгенерированный текст профиля -->
                </div>
                
                <div class="profile-buttons">
                    <button class="onboarding-btn primary" id="psychologistThoughtBtn">🧠 МЫСЛИ ПСИХОЛОГА</button>
                    <div class="button-row">
                        <button class="onboarding-btn secondary" id="askQuestionBtn">🎤 ХОЧУ ВЫСКАЗАТЬСЯ</button>
                        <button class="onboarding-btn secondary" id="chooseGoalBtn">🎯 ВЫБРАТЬ ЦЕЛЬ</button>
                    </div>
                    <button class="onboarding-btn secondary" id="chooseModeBtn">⚙️ ВЫБРАТЬ РЕЖИМ</button>
                </div>
            </div>
        </div>
    </template>

    <!-- Экран 9: Задать вопрос (С ГОЛОСОВОЙ КНОПКОЙ) -->
    <template id="askQuestionScreen">
        <div class="ask-question-container">
            <div class="ask-question-content">
                <h2 class="ask-question-title">✏️ ЗАДАВАЙТЕ ЛЮБОЙ ВОПРОС</h2>
                
                <div class="ask-question-text">
                    Если мой создатель знает ответ на него — значит и я вам что-то отвечу 😉
                </div>
                
                <div class="voice-hint">
                    🎤 <b>Можно просто отправить голосовое сообщение</b> — я внимательно выслушаю.
                </div>
                
                <div class="question-input-area">
                    <div class="input-group">
                        <input type="text" id="questionInput" class="question-input" placeholder="Напишите ваш вопрос...">
                        <button id="sendQuestionBtn" class="question-submit">➡️</button>
                    </div>
                    
                    <!-- 🔥 ГОЛОСОВАЯ КНОПКА 🔥 -->
                    <div class="voice-input-area">
                        <button id="voiceRecordBtn" class="voice-record-btn">🎤</button>
                        <div class="voice-status" id="voiceStatus" style="display: none;">
                            <span class="voice-status-dot"></span>
                            <span>Запись...</span>
                        </div>
                        <div class="voice-hint-text">
                            Нажмите и говорите (до 30 сек)
                        </div>
                    </div>
                </div>
                
                <div class="question-back">
                    <button class="onboarding-btn secondary" id="backToProfileBtn">◀️ НАЗАД</button>
                </div>
            </div>
        </div>

    <!-- ===== ОСНОВНАЯ ИНИЦИАЛИЗАЦИЯ - ТОЧКА ВХОДА В ЛИЧНЫЙ КАБИНЕТ ===== -->
    <script>
        // Глобальные переменные
        window.dashboard = null;
        window.api = new FrediAPI();
        
        // Функция показа экрана загрузки
        function showLoading() {
            const container = document.getElementById('screenContainer');
            if (container) {
                container.innerHTML = `
                    <div class="loading-screen">
                        <div class="loading-spinner">🧠</div>
                        <div class="loading-text">Загрузка личного кабинета...</div>
                    </div>
                `;
            }
        }
        
        // Функция показа экрана входа (если нет user_id)
        function showLoginScreen() {
            const container = document.getElementById('screenContainer');
            if (container) {
                container.innerHTML = `
                    <div class="login-screen">
                        <div class="login-icon">🔐</div>
                        <div class="login-title">Личный кабинет Фреди</div>
                        <div class="login-text">
                            Для доступа к личному кабинету<br>
                            необходимо открыть приложение через MAX.
                        </div>
                        <button class="login-btn" onclick="location.reload()">
                            🔄 ПОВТОРИТЬ
                        </button>
                    </div>
                `;
            }
        }
        
        // Функция инициализации дашборда
        async function initDashboard() {
            const userId = window.maxContext?.user_id || localStorage.getItem('fredi_user_id');
            
            if (!userId) {
                console.warn('⚠️ Нет user_id, показываем экран входа');
                showLoginScreen();
                return;
            }
            
            console.log('🚀 Загрузка личного кабинета для пользователя:', userId);
            showLoading();
            
            try {
                // Создаем экземпляр дашборда
                window.dashboard = new FrediDashboard();
                window.dashboard.userId = userId;
                
                // Загружаем данные пользователя
                await window.dashboard.loadUserData();
                
                // Рендерим дашборд
                window.dashboard.renderDashboard();
                
                // Обновляем имя пользователя в левой панели
                const userNameEl = document.getElementById('userName');
                if (userNameEl && window.dashboard.userName) {
                    userNameEl.textContent = window.dashboard.userName;
                }
                
                // Обновляем статус
                const userStatusEl = document.getElementById('userStatus');
                if (userStatusEl) {
                    if (window.dashboard.isTestCompleted) {
                        userStatusEl.innerHTML = `🧠 ${window.dashboard.profileCode || 'профиль готов'}`;
                    } else {
                        userStatusEl.innerHTML = `📝 тест не пройден`;
                    }
                }
                
                console.log('✅ Личный кабинет загружен');
                
            } catch (error) {
                console.error('❌ Ошибка загрузки личного кабинета:', error);
                
                // Показываем экран ошибки
                const container = document.getElementById('screenContainer');
                if (container) {
                    container.innerHTML = `
                        <div class="dashboard-error">
                            <div class="error-icon">⚠️</div>
                            <div class="error-title">Ошибка загрузки</div>
                            <div class="error-text">
                                Не удалось загрузить данные профиля.<br>
                                Пожалуйста, проверьте подключение к интернету.
                            </div>
                            <button class="test-required-btn" onclick="location.reload()">
                                🔄 ПОВТОРИТЬ
                            </button>
                        </div>
                    `;
                }
            }
        }
        
        // ===== ПОЛУЧЕНИЕ USER_ID ОТ MAX =====
        (function() {
            let userId = null;
            let chatId = null;
            let accessToken = null;
            
            // 1. Пробуем получить из URL параметров
            const urlParams = new URLSearchParams(window.location.search);
            userId = urlParams.get('user_id');
            chatId = urlParams.get('chat_id');
            accessToken = urlParams.get('access_token');
            
            if (userId) {
                console.log('✅ user_id получен из URL:', userId);
            }
            
            // 2. Пробуем получить из MAX WebApp
            if (!userId && window.MAX?.WebApp?.initDataUnsafe?.user?.id) {
                userId = window.MAX.WebApp.initDataUnsafe.user.id;
                console.log('✅ user_id получен из MAX.WebApp:', userId);
            }
            
            // 3. Пробуем получить из Telegram WebApp
            if (!userId && window.Telegram?.WebApp?.initDataUnsafe?.user?.id) {
                userId = window.Telegram.WebApp.initDataUnsafe.user.id;
                console.log('✅ user_id получен из Telegram.WebApp:', userId);
            }
            
            // 4. Пробуем получить из localStorage
            if (!userId) {
                const savedUserId = localStorage.getItem('fredi_user_id');
                if (savedUserId) {
                    userId = savedUserId;
                    console.log('💾 user_id получен из localStorage:', userId);
                }
            }
            
            // 5. Тестовый режим
            if (!userId) {
                const testMode = localStorage.getItem('fredi_test_mode');
                if (testMode === 'true') {
                    userId = prompt('🧪 ТЕСТОВЫЙ РЕЖИМ\n\nВведите ваш ID пользователя:', '213102077');
                    if (userId) {
                        localStorage.setItem('fredi_user_id', userId);
                        localStorage.setItem('fredi_test_mode', 'true');
                        console.log('🔧 Установлен тестовый user_id:', userId);
                    } else {
                        userId = '213102077';
                        console.warn('⚠️ Используем тестовый user_id:', userId);
                    }
                }
            }
            
            // Сохраняем в localStorage
            if (userId && userId !== '213102077') {
                localStorage.setItem('fredi_user_id', userId);
            }
            
            // Сохраняем глобально
            window.maxContext = {
                user_id: userId,
                chat_id: chatId,
                access_token: accessToken
            };
            
            console.log('🎯 Итоговый user_id:', userId);
            console.log('📦 maxContext:', window.maxContext);
            
            // Сообщаем MAX, что приложение загружено
            if (window.MAX?.WebApp) {
                window.MAX.WebApp.ready();
                window.MAX.WebApp.expand();
            }
            if (window.Telegram?.WebApp) {
                window.Telegram.WebApp.ready();
                window.Telegram.WebApp.expand();
            }
            
            // Запускаем инициализацию дашборда
            initDashboard();
        })();

        // ===== ПОЛУЧЕНИЕ ТЕМЫ ОТ MAX =====
        (function() {
            function applyMaxTheme(theme) {
                console.log('🎨 Применяем тему MAX:', theme);
                
                const root = document.documentElement;
                
                root.style.setProperty('--max-bg', theme.bg_color || '#0e1621');
                root.style.setProperty('--max-panel-bg', theme.secondary_bg_color || '#17212b');
                root.style.setProperty('--max-header-bg', theme.header_bg_color || '#1f2c38');
                root.style.setProperty('--max-input-bg', theme.input_bg_color || '#1f2c38');
                root.style.setProperty('--max-text', theme.text_color || '#ffffff');
                root.style.setProperty('--max-text-secondary', theme.hint_color || '#8e9aa6');
                root.style.setProperty('--max-border', theme.separator_color || '#0f1b26');
                root.style.setProperty('--max-hover', theme.section_bg_color || '#2b3b4a');
                root.style.setProperty('--max-blue', theme.accent_text_color || '#248bf2');
                root.style.setProperty('--max-message-bot', theme.message_bg_color || '#1f2c38');
                root.style.setProperty('--max-message-user', theme.message_user_bg_color || '#2b5278');
                root.style.setProperty('--glass-bg', 'rgba(255,255,255,0.05)');
                root.style.setProperty('--glass-border', 'rgba(255,255,255,0.1)');
                
                document.body.style.backgroundColor = theme.bg_color || '#0e1621';
                document.body.style.color = theme.text_color || '#ffffff';
                
                localStorage.setItem('max_theme', JSON.stringify(theme));
            }
            
            if (window.MAX?.WebApp) {
                try {
                    const theme = window.MAX.WebApp.themeParams;
                    if (theme) {
                        applyMaxTheme(theme);
                    }
                    
                    window.MAX.WebApp.onEvent('themeChanged', function(newTheme) {
                        applyMaxTheme(newTheme);
                    });
                } catch (e) {
                    console.warn('❌ Ошибка получения темы MAX:', e);
                }
            } else {
                try {
                    const savedTheme = localStorage.getItem('max_theme');
                    if (savedTheme) {
                        applyMaxTheme(JSON.parse(savedTheme));
                    }
                } catch (e) {
                    console.warn('❌ Ошибка загрузки темы:', e);
                }
            }
        })();
    </script>
    
    <!-- ===== ИНИЦИАЛИЗАЦИЯ ГОЛОСОВЫХ ФУНКЦИЙ ===== -->
    <script>
        // Глобальные переменные для голоса
        window.voiceRecorder = {
            mediaRecorder: null,
            audioChunks: [],
            isRecording: false,
            recordingStartTime: null,
            recordingTimer: null
        };
        
        // Функция показа уведомления
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toastMessage');
            if (!toast) return;
            
            toast.textContent = message;
            toast.className = `toast-message ${type} show`;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
        
        // Функция начала записи
        window.startVoiceRecording = async function() {
            if (window.voiceRecorder.isRecording) {
                stopVoiceRecording();
                return;
            }
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                window.voiceRecorder.mediaRecorder = new MediaRecorder(stream, {
                    mimeType: MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/ogg'
                });
                window.voiceRecorder.audioChunks = [];
                
                window.voiceRecorder.mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        window.voiceRecorder.audioChunks.push(event.data);
                    }
                };
                
                window.voiceRecorder.mediaRecorder.onstop = async () => {
                    stream.getTracks().forEach(track => track.stop());
                    const audioBlob = new Blob(window.voiceRecorder.audioChunks, { type: 'audio/webm' });
                    await sendVoiceToServer(audioBlob);
                };
                
                window.voiceRecorder.mediaRecorder.start(1000);
                window.voiceRecorder.isRecording = true;
                window.voiceRecorder.recordingStartTime = Date.now();
                
                const voiceBtn = document.getElementById('voiceRecordBtn');
                if (voiceBtn) {
                    voiceBtn.textContent = '⏹️';
                    voiceBtn.classList.add('recording');
                }
                
                const voiceStatus = document.getElementById('voiceStatus');
                if (voiceStatus) voiceStatus.style.display = 'flex';
                
                startRecordingTimerUI();
                
                setTimeout(() => {
                    if (window.voiceRecorder.isRecording) stopVoiceRecording();
                }, 30000);
                
            } catch (error) {
                console.error('Microphone error:', error);
                showToast('Не удалось получить доступ к микрофону', 'error');
            }
        };
        
        // Функция остановки записи
        window.stopVoiceRecording = function() {
            if (window.voiceRecorder.mediaRecorder && window.voiceRecorder.isRecording) {
                window.voiceRecorder.mediaRecorder.stop();
                window.voiceRecorder.isRecording = false;
                stopRecordingTimerUI();
                
                const voiceBtn = document.getElementById('voiceRecordBtn');
                if (voiceBtn) {
                    voiceBtn.textContent = '🎤';
                    voiceBtn.classList.remove('recording');
                }
                
                const voiceStatus = document.getElementById('voiceStatus');
                if (voiceStatus) voiceStatus.style.display = 'none';
            }
        };
        
        function startRecordingTimerUI() {
            const timerEl = document.getElementById('recordingTimer');
            if (!timerEl) return;
            
            if (window.voiceRecorder.recordingTimer) clearInterval(window.voiceRecorder.recordingTimer);
            
            window.voiceRecorder.recordingTimer = setInterval(() => {
                if (window.voiceRecorder.isRecording && window.voiceRecorder.recordingStartTime) {
                    const elapsed = Math.floor((Date.now() - window.voiceRecorder.recordingStartTime) / 1000);
                    timerEl.textContent = `${elapsed}s`;
                    timerEl.style.display = 'block';
                    
                    if (elapsed >= 30) stopVoiceRecording();
                }
            }, 1000);
        }
        
        function stopRecordingTimerUI() {
            if (window.voiceRecorder.recordingTimer) {
                clearInterval(window.voiceRecorder.recordingTimer);
                window.voiceRecorder.recordingTimer = null;
            }
            const timerEl = document.getElementById('recordingTimer');
            if (timerEl) timerEl.style.display = 'none';
        }
        
        async function sendVoiceToServer(audioBlob) {
            showToast('Распознаю речь...', 'info');
            
            const formData = new FormData();
            formData.append('user_id', window.maxContext?.user_id || localStorage.getItem('fredi_user_id'));
            formData.append('voice', audioBlob, 'voice.webm');
            
            try {
                const response = await fetch('/api/voice/process', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    if (result.recognized_text) {
                        showToast(`🎤 Вы сказали: ${result.recognized_text}`, 'success');
                    }
                    if (result.answer) {
                        const container = document.getElementById('screenContainer');
                        if (container && window.dashboard) {
                            window.dashboard.showFloatingMessage(result.answer, 'info');
                        }
                    }
                    if (result.audio_url) {
                        const audio = document.getElementById('hiddenAudioPlayer');
                        if (audio) {
                            audio.src = result.audio_url;
                            audio.play().catch(e => console.warn('Audio play error:', e));
                        }
                    }
                } else {
                    showToast(result.error || 'Не удалось распознать речь', 'error');
                }
            } catch (error) {
                console.error('Send voice error:', error);
                showToast('Ошибка отправки голоса', 'error');
            }
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            const voiceBtn = document.getElementById('voiceRecordBtn');
            if (voiceBtn) {
                voiceBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    if (window.startVoiceRecording) {
                        window.startVoiceRecording();
                    }
                });
            }
        });
        
        window.showToast = showToast;
        window.sendVoiceToServer = sendVoiceToServer;
    </script>
